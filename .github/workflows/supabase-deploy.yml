name: Deploy Supabase (migrations + edge functions)

on:
  push:
    branches: [main]
    paths:
      - 'website/supabase/migrations/**'
      - 'website/supabase/functions/**'
  workflow_dispatch: # allow manual trigger from GitHub UI

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
      SUPABASE_DB_PASSWORD: ${{ secrets.SUPABASE_DB_PASSWORD }}
      SUPABASE_PROJECT_ID: juaqategmrghsfkbaiap

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Supabase CLI
        uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Link Supabase project
        working-directory: website
        run: |
          supabase link --project-ref $SUPABASE_PROJECT_ID --password "$SUPABASE_DB_PASSWORD"

      - name: Push database migrations
        working-directory: website
        run: |
          supabase db push --password "$SUPABASE_DB_PASSWORD" || echo "No new migrations or all already applied"

      - name: Deploy edge functions
        working-directory: website
        run: |
          for fn in supabase/functions/*/; do
            name=$(basename "$fn")
            if [ "$name" != "_shared" ]; then
              echo "Deploying $name..."
              supabase functions deploy "$name" --no-verify-jwt --project-ref $SUPABASE_PROJECT_ID || echo "Failed to deploy $name"
            fi
          done

      - name: Summary
        run: |
          echo "### Supabase Deploy Complete" >> $GITHUB_STEP_SUMMARY
          echo "Migrations and edge functions pushed to production." >> $GITHUB_STEP_SUMMARY
