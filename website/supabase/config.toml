# Supabase project configuration
# This file tells the Supabase CLI + GitHub integration where to find migrations and functions.
# Required for automated deployment.

project_id = "juaqategmrghsfkbaiap"

[api]
enabled = true
port = 54321
schemas = ["public"]
extra_search_path = ["public", "extensions"]
max_rows = 1000

[db]
port = 54322
shadow_port = 54320
major_version = 15

[db.migrations]
# Folder containing migration files (relative to this config)
# migrations/ contains files like 001_schema.sql, 046_newsletter_industry.sql, etc.

[studio]
enabled = true
port = 54323

[storage]
enabled = true
file_size_limit = "50MiB"

[auth]
enabled = true
site_url = "https://loud-legacy.com"
additional_redirect_urls = ["https://loud-legacy.com/**"]
jwt_expiry = 3600
enable_signup = true

[edge_runtime]
enabled = true
policy = "oneshot"
