<!-- Loud Legacy wordmark — heavy gold "LOUD LEGACY" between two
     3px gold rules. Transparent background. viewBox 4.2:1 with a
     wide pad so the wordmark + rules sit cleanly inside.

     Belt-and-suspenders against clipping: textLength=430 with
     lengthAdjust=spacingAndGlyphs pins the rendered text to that
     pixel width regardless of which font actually rendered
     (IBM Plex 900, system fallback, RSS readers, email clients,
     Search Console previews). The text then sits comfortably
     centered with 35px clearance on each side. -->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 120" preserveAspectRatio="xMidYMid meet">
  <line x1="14" y1="14" x2="486" y2="14" stroke="#E8B84B" stroke-width="3" stroke-linecap="round" />
  <text x="250" y="85"
        text-anchor="middle"
        font-family="'IBM Plex Sans', 'Helvetica Neue', Arial, system-ui, sans-serif"
        font-weight="900"
        font-size="62"
        textLength="430"
        lengthAdjust="spacingAndGlyphs"
        fill="#E8B84B">LOUD LEGACY</text>
  <line x1="14" y1="106" x2="486" y2="106" stroke="#E8B84B" stroke-width="3" stroke-linecap="round" />
</svg>
