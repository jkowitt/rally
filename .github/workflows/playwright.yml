name: Playwright E2E (smoke)

on:
  pull_request:
    paths:
      - 'website/src/**'
      - 'website/tests/**'
      - 'website/playwright.config.ts'
      - 'website/package.json'
      - 'website/index.html'
      - 'website/vite.config.js'
      - '.github/workflows/playwright.yml'
  push:
    branches: [main]
    paths:
      - 'website/src/**'
      - 'website/tests/**'
      - 'website/playwright.config.ts'

jobs:
  e2e:
    name: smoke
    runs-on: ubuntu-latest
    timeout-minutes: 15
    defaults:
      run:
        working-directory: website

    env:
      # Public Supabase URL + anon key — these are browser-facing, so using
      # them in CI is fine. They should also be available as repo secrets
      # for CI to hit the real backend during the smoke test; set them in
      # GitHub Actions secrets as VITE_SUPABASE_URL / VITE_SUPABASE_ANON_KEY.
      VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
      VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}
      CI: true

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: website/package-lock.json

      - name: Install deps
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Build app
        run: npm run build

      - name: Run smoke tests
        run: npm run test:e2e

      - name: Upload report on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: website/playwright-report/
          retention-days: 14
