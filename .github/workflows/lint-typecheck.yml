name: Lint + Typecheck

on:
  pull_request:
    paths:
      - 'website/src/**'
      - 'website/tsconfig.json'
      - 'website/eslint.config.js'
      - 'website/package.json'
      - 'website/package-lock.json'
      - '.github/workflows/lint-typecheck.yml'
  push:
    branches: [main]
    paths:
      - 'website/src/**'
      - 'website/tsconfig.json'
      - 'website/eslint.config.js'

jobs:
  check:
    name: lint + typecheck
    runs-on: ubuntu-latest
    timeout-minutes: 10
    defaults:
      run:
        working-directory: website

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: website/package-lock.json

      - name: Install deps
        run: npm ci

      - name: Typecheck (tsc --noEmit)
        run: npm run typecheck

      # Lint runs after typecheck — TS issues are usually the
      # higher-signal failure to surface first.
      - name: Lint (eslint)
        run: npm run lint
        continue-on-error: true
        # `continue-on-error: true` because the codebase has accumulated
        # ~80 pre-existing lint errors. Don't block PRs on debt that
        # predates this workflow. Tighten to `false` once debt is paid.
