<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="manifest" href="/manifest.json" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Loud CRM — Grow Your Business Loudly | CRM, Prospecting &amp; Tools</title>
    <meta name="description" content="Loud CRM: Grow Your Business Loudly. One workspace for CRM, AI prospecting, and powerful sales tools. Find prospects, close deals, and grow your business — free to start." />
    <meta name="keywords" content="Loud CRM, CRM, prospecting platform, sales tools, B2B CRM, deal pipeline, outreach automation, AI sales assistant, contract management, sales operating system, grow your business" />
    <meta name="author" content="Loud CRM" />
    <meta name="robots" content="index, follow" />
    <link rel="canonical" href="https://loud-legacy.com" />

    <!-- Open Graph / Social -->
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://loud-legacy.com" />
    <meta property="og:title" content="Loud CRM — Grow Your Business Loudly" />
    <meta property="og:description" content="CRM, Prospecting, and Tools in one workspace. AI-powered pipeline, verified contact data, and outreach sequences — built for revenue teams ready to grow loud." />
    <meta property="og:site_name" content="Loud CRM" />

    <!-- Twitter -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Loud CRM — Grow Your Business Loudly" />
    <meta name="twitter:description" content="CRM, Prospecting, and Tools in one workspace. Where revenue grows loud." />

    <!-- Theme -->
    <meta name="theme-color" content="#E8B84B" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />

    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600;700&family=IBM+Plex+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet" />

    <!-- Structured Data — three @types Google uses for branding:
         • Organization gives Search the brand name + logo for the
           SERP knowledge card (and feeds the favicon panel).
         • WebSite gives Search the canonical site name + the
           potential sitelinks search box.
         • SoftwareApplication describes what the product is so
           it qualifies for the "software" rich result.
         Keep these in one @graph rather than three <script> blocks
         so Google's parsers see them as a single connected entity. -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@graph": [
        {
          "@type": "Organization",
          "@id": "https://loud-legacy.com/#organization",
          "name": "Loud CRM",
          "url": "https://loud-legacy.com",
          "logo": {
            "@type": "ImageObject",
            "url": "https://loud-legacy.com/logo-loud-legacy.svg",
            "width": 512,
            "height": 512
          },
          "sameAs": [
            "https://www.linkedin.com/company/loud-legacy"
          ],
          "contactPoint": {
            "@type": "ContactPoint",
            "email": "jason@loud-legacy.com",
            "contactType": "customer support"
          }
        },
        {
          "@type": "WebSite",
          "@id": "https://loud-legacy.com/#website",
          "url": "https://loud-legacy.com",
          "name": "Loud CRM",
          "publisher": { "@id": "https://loud-legacy.com/#organization" }
        },
        {
          "@type": "SoftwareApplication",
          "name": "Loud CRM",
          "applicationCategory": "BusinessApplication",
          "operatingSystem": "Web",
          "description": "Loud CRM: Grow Your Business Loudly. The AI-native CRM, prospecting, and tools platform. Unified pipeline, AI-grounded prospect generation, outreach sequences, signal radar, and powerful sales tools in one workspace.",
          "offers": {
            "@type": "Offer",
            "price": "0",
            "priceCurrency": "USD"
          },
          "featureList": [
            "AI morning brief grounded in closed-won patterns + recent activity",
            "Deal pipeline + accounts + contacts + custom fields",
            "AI prospect generation with verified decision-makers",
            "Voice + meeting capture with auto-transcription and action-item extraction (Enterprise)",
            "Multi-mailbox inbox (Outlook + Gmail) with AI reply suggestions",
            "Multi-step prospect sequences with AI coach + A/B variants",
            "Signal radar — job changes, funding rounds, EDGAR filings",
            "Renewal pipeline + account health scoring",
            "Sponsor portal + audit log + saved views + public API"
          ],
          "publisher": { "@id": "https://loud-legacy.com/#organization" }
        }
      ]
    }
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
    <script src="/t.js" defer></script>
  </body>
</html>
